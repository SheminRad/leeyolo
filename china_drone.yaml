# china_drone.yaml

# Base path to the dataset (relative to your project root)
path: RDD2022/China_Drone

# Train and Val image directories
train: train/images
val: val/images # NOTE: Pointing to train for now since I don't see a 'val' folder in your screenshot.

# Number of classes
nc: 4

# Class names (Standard RDD2022 mapping for the 4 damages)
names:
  0: longitudinal_crack  # D00
  1: transverse_crack    # D10
  2: alligator_crack     # D20
  3: pothole             # D40